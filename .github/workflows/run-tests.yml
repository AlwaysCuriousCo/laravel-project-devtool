name: run-tests

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        # Test the edges of the support surface rather than the full cartesian
        # product: the oldest-supported combo (prefer-lowest catches use of
        # too-new APIs) and the newest combo (prefer-stable catches deprecations),
        # plus representative middle points. Linux only — see CONTRIBUTING for
        # the rationale on dropping Windows.
        include:
          # Oldest supported: PHP 8.3 + Laravel 11, lowest deps
          - os: ubuntu-latest
            php: 8.3
            laravel: 11.*
            testbench: 9.*
            stability: prefer-lowest
          # Laravel 12 across the PHP range, stable deps
          - os: ubuntu-latest
            php: 8.3
            laravel: 12.*
            testbench: 10.*
            stability: prefer-stable
          - os: ubuntu-latest
            php: 8.4
            laravel: 12.*
            testbench: 10.*
            stability: prefer-stable
          # Newest supported: PHP 8.5 + Laravel 13, both stability ends
          - os: ubuntu-latest
            php: 8.5
            laravel: 13.*
            testbench: 11.*
            stability: prefer-lowest
          - os: ubuntu-latest
            php: 8.5
            laravel: 13.*
            testbench: 11.*
            stability: prefer-stable

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Execute tests
        run: vendor/bin/pest --ci
